<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DLC Streaming</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Plyr CSS for modern video player styling -->
    <link rel="stylesheet" href="/assets/plyr.css" />
    <style>
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: rgba(255,255,255,0.08);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            padding: 32px;
            max-width: 700px;
            width: 100%;
        }
        h1 {
            color: #fff;
            text-align: center;
            margin-bottom: 24px;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .plyr {
            border-radius: 12px;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>DLC Live STreaming</h1>
        <!-- Video.js for FLV streaming support -->
        <video id="player" class="plyr" controls width="100%" height="400"></video>
    </div>
    <!-- flv.js for FLV streaming -->
    <script src="/assets/flv.min.js"></script>
    <!-- Plyr JS for beautiful controls -->
    <script src="/assets/plyr.polyfilled.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const videoElement = document.getElementById('player');
            if (flvjs.isSupported()) {
                const flvPlayer = flvjs.createPlayer({
                    type: 'flv',
                    url: 'static/result.flv'
                });
                flvPlayer.attachMediaElement(videoElement);
                flvPlayer.load();
            }
            const plyrPlayer = new Plyr(videoElement, {
                controls: [
                    'play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'fullscreen'
                ],
                seekTime: 10,
                autoplay: false,
                ratio: '16:9'
            });
        });
    </script>
</body>
</html>
